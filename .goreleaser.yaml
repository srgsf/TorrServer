---
version: 2

project_name: TorrServer

report_sizes: false

env:
  - NODE_OPTIONS=--openssl-legacy-provider
  - CLEAN_ENV=env GOOS= GOARCH= GOARM=
  - Metadata_Description=Torrent stream server
  - Metadata_License=GPL-3.0

# MatriX.* tags: sort versions correctly for changelog "previous tag".
git:
  tag_sort: -version:refname

snapshot:
  version_template: "{{ .Tag }}-{{ .ShortCommit }}"

before:
  hooks:
    - '{{ .Env.CLEAN_ENV }} {{ .Env.GO_BINARY }} run gen_web.go'
    - '{{ .Env.CLEAN_ENV }} {{ .Env.GO_BINARY }} install github.com/swaggo/swag/cmd/swag@latest'
    - bash -c 'cd server && {{ .Env.CLEAN_ENV }} swag init -g web/server.go'

builds:
  - id: binary
    tool: '{{ .Env.GO_BINARY }}'
    dir: server
    main: ./cmd
    binary: '{{ .ProjectName }}-{{ .Os }}-{{ if eq .Arch "arm" }}arm{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}'
    no_unique_dist_dir: true
    flags:
      - -trimpath
    tags:
      - nosqlite
    ldflags:
      # .Version equals .Tag on release; snapshots get -<commit> (see snapshot.version_template)
      - -s -w -checklinkname=0 -X server/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_5
      - linux_arm_7
      - linux_386
      - windows_amd64
      - windows_386
      - darwin_amd64
      - darwin_arm64
      - freebsd_amd64
      - freebsd_arm_7
      - linux_mips_softfloat
      - linux_mipsle_softfloat
      - linux_mips64_softfloat
      - linux_mips64le_softfloat
      - linux_riscv64

  - id: gst
    tool: '{{ .Env.GO_BINARY }}'
    dir: server
    main: ./cmd
    binary: '{{ .ProjectName }}-gst-{{ .Os }}-{{ if eq .Arch "arm" }}arm{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}'
    no_unique_dist_dir: true
    flags:
      - -trimpath
    tags:
      - nosqlite
      - gst
    ldflags:
      # .Version equals .Tag on release; snapshots get -<commit> (see snapshot.version_template)
      - -s -w -checklinkname=0 -X server/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64

  - id: android
    dir: server
    main: ./cmd
    binary: '{{ .ProjectName }}-android-{{ .Os }}-{{ if eq .Arch "arm" }}arm{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}'
    no_unique_dist_dir: true
    builder: go
    tool: '{{ .Env.GO_ANDROID_BINARY }}'
    flags:
      - -trimpath
    tags:
      - nosqlite
    ldflags:
      - -s -w -checklinkname=0 -X server/version.Version={{.Version}}
    targets:
      - android_arm_7
      - android_arm64
      - android_386
      - android_amd64
    overrides:
      - goos: android
        goarch: arm
        goarm: "7"
        env:
          - CGO_ENABLED=1
          - CC={{ .Env.NDK_TOOLCHAIN }}/bin/armv7a-linux-androideabi21-clang
      - goos: android
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC={{ .Env.NDK_TOOLCHAIN }}/bin/aarch64-linux-android21-clang
      - goos: android
        goarch: "386"
        env:
          - CGO_ENABLED=1
          - CC={{ .Env.NDK_TOOLCHAIN }}/bin/i686-linux-android21-clang
      - goos: android
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC={{ .Env.NDK_TOOLCHAIN }}/bin/x86_64-linux-android21-clang

upx:
  - enabled: '{{ .Env.UPX_ENABLED }}'
    ids:
      - binary
      - gst
      - binary-android
    goos:
      - linux
      - windows
      - android
    goarch:
      - arm
      - arm64
      - amd64
      - '386'
      - mips
      - mipsle
    compress: best
    lzma: true

archives:
  - id: releases
    formats:
      - binary

source:
  enabled: false

checksum:
  name_template: checksums.txt

release:
  mode: append
  replace_existing_artifacts: true
  make_latest: true

changelog:
  use: git
  sort: asc

dockers_v2:
  - id: docker
    ids:
      - binary
    dockerfile: Dockerfile
    images:
      - '{{ .Env.DOCKER_IMAGE_ID }}'
    tags:
      - '{{ .Tag }}'
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    extra_files:
      - docker-entrypoint.sh
    labels:
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.description": "{{.Env.Metadata_Description}}"
      "org.opencontainers.image.url": "{{.GitURL}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.version": "{{.Tag}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.licenses": "{{.Env.Metadata_License}}"
    annotations:
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.description": "{{.Env.Metadata_Description}}"
      "org.opencontainers.image.url": "{{.GitURL}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.version": "{{.Tag}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.licenses": "{{.Env.Metadata_License}}"
    sbom: "{{ not .IsSnapshot }}"
